name: Firebase App Distribution

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

concurrency:
  group: firebase-distribution-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    name: Build release APK and deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

      - name: Set Sentry release metadata for this build
        run: |
          cat > sentry.config.js <<EOF
          /** Generated by CI — do not edit manually */
          module.exports = {
            release: 'com.ustadapp@0.0.1+${{ github.run_number }}',
            dist: '${{ github.sha }}',
          };
          EOF

      - name: Install google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s\n' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "google-services.json written from secret."
          else
            echo "GOOGLE_SERVICES_JSON secret not set — release build will skip Google Services plugin."
          fi

      - name: Prepare fonts and launcher icons
        run: npm run link:fonts && npm run generate:icons

      - name: Ensure debug keystore (Firebase App Distribution — no Play Store key needed)
        run: |
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair -v -storetype PKCS12 \
              -keystore android/app/debug.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Verify APK exists
        run: test -f android/app/build/outputs/apk/release/app-release.apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          # Group alias (not display name "TesterUstadTeam")
          groups: ustad-app-beta
          file: mobile/android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: |
            Build #${{ github.run_number }} (${{ github.sha }})
            Ref: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}
            Sentry release: com.ustadapp@0.0.1+${{ github.run_number }}
